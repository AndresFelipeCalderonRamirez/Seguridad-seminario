---
name: CI Security Pipeline (Java Maven)

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean compile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: "[SAST] Analyze CodeQL"
        uses: github/codeql-action/analyze@v3

      - name: "[SCA] OWASP Dependency Check"
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=reports \
            -DsuppressionFiles=suppressions.xml
        continue-on-error: true

      - name: Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-dependencias
          path: reports/

      # ✅ Gitleaks como run: directo, escanea TODO el directorio
      - name: "[CREDS] Scan for secrets (Gitleaks)"
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect \
            --source=. \
            --no-git \
            --report-format=sarif \
            --report-path=gitleaks-report.sarif \
            --exit-code=1 \
            -v

      - name: Publicar reporte Gitleaks
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif

      - name: "[BUILD] Package application"
        run: mvn clean package -DskipTests
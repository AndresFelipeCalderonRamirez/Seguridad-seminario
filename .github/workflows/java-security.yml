---
name: CI Security Pipeline (Java Maven)

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean compile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: "[SAST] Analyze CodeQL"
        uses: github/codeql-action/analyze@v3

      - name: "[SCA] OWASP Dependency Check"
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=reports
        continue-on-error: true

      - name: Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-dependencias
          path: reports/

      - name: "[CREDS] Scan for secrets (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
        with:
          args: detect --source=. --no-git -v --exit-code=2

      - name: "[BUILD] Package application"
        run: mvn clean package
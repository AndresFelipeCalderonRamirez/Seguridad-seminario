name: CI Security Pipeline (Java Maven)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  security-events: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache de Maven (mejora rendimiento)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 4. Build (compila el proyecto)
      - name: Build with Maven
        run: mvn clean compile

      # -----------------------------
      # 5. SAST (CodeQL para Java)
      # -----------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v3

      # -----------------------------
      # 6. SCA (Dependencias Maven)
      # -----------------------------
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check

      # -----------------------------
      # 7. Detección de secretos
      # -----------------------------
      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      # -----------------------------
      # 8. Validación de configuración
      # -----------------------------
      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint .

      - name: Validate JSON files
        run: |
          sudo apt-get install -y jq
          find . -name "*.json" -exec jq empty {} \;

      # -----------------------------
      # 9. Build final (fail fast)
      # -----------------------------
      - name: Package application
        run: mvn clean package
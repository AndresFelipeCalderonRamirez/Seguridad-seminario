name: Validacion de Seguridad en el Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Obtener el codigo ──────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para que gitleaks revise todo el historial

      # ── 2. Configurar Java ───────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. CREDENCIALES — Gitleaks ───────────────────────────────────────
      # Busca claves API, tokens, contraseñas hardcodeadas en el codigo
      - name: "[CREDS] Detectar credenciales expuestas con Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false  # falla el pipeline si encuentra algo

      # ── 4. SCA — OWASP Dependency Check ──────────────────────────────────
      # Revisa si las dependencias del pom.xml tienen CVEs conocidos
      - name: "[SCA] Analisis de dependencias con OWASP Dependency Check"
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'mi-proyecto'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Publicar reporte SCA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-dependencias
          path: reports/

      # ── 5. COMPILAR ───────────────────────────────────────────────────────
      - name: Compilar el proyecto con Maven
        run: mvn clean package -DskipTests

      # ── 6. SAST — SpotBugs + FindSecBugs ─────────────────────────────────
      # Analisis estatico del bytecode Java buscando vulnerabilidades
      - name: "[SAST] Analisis estatico con SpotBugs y FindSecBugs"
        run: mvn spotbugs:check

      # ── 7. CONFIG — Validar YAMLs del repo ───────────────────────────────
      - name: "[CONFIG] Validar archivos YAML con yamllint"
        run: |
          pip install yamllint
          yamllint .github/workflows/

      # ── 8. BUILD FINAL ────────────────────────────────────────────────────
      # Solo llega aqui si TODOS los pasos anteriores pasaron
      - name: "[BUILD] Construir artefacto final"
        run: |
          echo "✅ Todas las validaciones de seguridad pasaron."
          echo "✅ Artefacto listo en target/"
          ls target/*.jar 2>/dev/null || echo "Sin JAR generado aun"
name: Validacion de Seguridad en el Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Obtener el codigo ──────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configurar Java ───────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. CREDENCIALES — Gitleaks ───────────────────────────────────────
      - name: "[CREDS] Detectar credenciales expuestas"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. COMPILAR ───────────────────────────────────────────────────────
      - name: Compilar el proyecto
        run: mvn clean package -DskipTests

      # ── 5. SCA — OWASP via Maven (sin Docker, sin conflicto de JAVA_HOME) ─
      - name: "[SCA] Analisis de dependencias con OWASP"
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=reports
        continue-on-error: true

      - name: Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-dependencias
          path: reports/

      # ── 6. SAST — SpotBugs + FindSecBugs ─────────────────────────────────
      - name: "[SAST] Analisis estatico con SpotBugs"
        run: mvn spotbugs:check
        continue-on-error: true

      # ── 7. CONFIG — Validar YAMLs ─────────────────────────────────────────
      - name: "[CONFIG] Validar archivos YAML"
        run: |
          pip install yamllint --quiet
          yamllint .github/workflows/

      # ── 8. BUILD FINAL ────────────────────────────────────────────────────
      - name: "[BUILD] Artefacto final generado"
        run: |
          echo " Todas las validaciones completadas."
          ls target/*.jar 2>/dev/null || echo "Sin JAR generado"
---
name: Validacion de Seguridad en el Build

"on":
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "[CREDS] Detectar credenciales expuestas"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compilar el proyecto
        run: mvn clean package -DskipTests

      - name: "[SCA] Analisis de dependencias con OWASP"
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=reports
        continue-on-error: true

      - name: Publicar reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-dependencias
          path: reports/

      - name: "[SAST] Analisis estatico con SpotBugs"
        run: mvn spotbugs:check
        continue-on-error: true

      - name: "[BUILD] Artefacto final generado"
        run: |
          echo "Todas las validaciones completadas."
          ls target/*.jar 2>/dev/null || echo "Sin JAR generado"